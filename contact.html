<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="src/css/master.css">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="assets/favicon/site.webmanifest">
    <title>HAKAMAKI</title>
  </head>
  <body>
    <main>
      <a class="home-page-button" href="index.html">
        Back to home page
      </a>
      <div class="wrapper">
        <div class="grid-container section-contact">
          <div class="section-contact-content">
            <div class="section-title-text-layout section-contact-title">
              <h3>Write us a letter</h3>
              <h4>All questions, suggestions, and business or personal inquiries are welcome</h4>
            </div>
            <form class="section-contact-form" method="POST" action="https://formspree.io/f/mqegeoed">
              <input class="stl-input section-contact-input" type="text" name="name" placeholder="Name" required>
              <input class="stl-input section-contact-input" type="email" name="email" placeholder="Email" required>
              <input class="stl-input section-contact-input" type="text" name="subject" placeholder="Subject" required>
              <textarea class="stl-input section-contact-textarea" name="message" rows="5" placeholder="Message" required></textarea>
              <button class="stl-button" type="submit">Send</button>
            </form>
          </div>
        </div>
      </div>
    </main>
    <footer></footer>
    <script src="src/js/footer.js"></script>
  </body>
</html>
